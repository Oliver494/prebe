<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ESTILO BASE */
        body {
            background-color: #f4f4f4;
            color: #333;
            font-family: 'Arimo', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* HEADER - Ajustado para que no parezca zoom */
        #cabecera {
            position: relative;
            background: #222 url('/static/imagen/fondo_habana.jpg') no-repeat center 15%;
            background-size: cover;
            padding: 60px 20px 100px 20px; /* Padding reducido para elegancia */
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* LOGO - Control de tamaño aquí */
        .logo-palenque {
            position: relative;
            z-index: 2;
            width: 220px; /* <--- CAMBIA EL TAMAÑO DEL LOGO AQUÍ */
            height: auto;
            margin-bottom: 15px;
        }

        /* TÍTULO - Ahora el CSS coincide con el HTML */
        #cabecera h1 {
            color: #ffffff !important;
            font-size: 42px; /* <--- CAMBIA EL TAMAÑO DE LA LETRA AQUÍ */
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            margin: 0;
            position: relative;
            z-index: 2;
            text-transform: uppercase;
        }

        #cabecera h1 span {
            color: #ffffff;
        }

        /* DESCRIPCIÓN */
        .site-description {
            color: #ffffff !important;
            font-size: 16px; /* <--- TAMAÑO DE LA FRASE DE ABAJO */
            font-weight: 400;
            margin-top: 8px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
        }

        /* RAYA AZUL */
        .raya-azul {
            height: 5px;
            background-color: #0088cc;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* GRID DE NOTICIAS */
        .contenedor-grid {
            max-width: 1200px;
            margin: 40px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 0 20px;
        }

        .cartel {
            position: relative;
            width: 340px;
            background: #ffffff;
            border: 1px solid #ddd;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cartel:hover {
            transform: translateY(-5px);
        }

        .cartel img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .info-cartel {
            padding: 15px;
            border-top: 4px solid #0088cc;
        }

        .info-cartel h2 {
            font-size: 17px;
            margin: 0;
            color: #1a1a1a;
            line-height: 1.4;
        }

        /* PIEZA INVISIBLE (Para tocar las casillas) */
        .pieza-invisible {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="interfaz-total" style="position: fixed; top: 0; left: 20px; z-index: 9999; display: flex; flex-direction: column; align-items: center;">
        <img src="/static/imagen/bandera.png" alt="Cuba" style="width: 45px; height: auto; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
        
        <div id="botonMenu" onclick="toggleMenuPalenque(event)" style="width: 45px; height: 45px; background-color: #0088cc; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; cursor: pointer;">
            <span style="width: 20px; height: 3px; background: white;"></span>
            <span style="width: 20px; height: 3px; background: white;"></span>
            <span style="width: 20px; height: 3px; background: white;"></span>
        </div>

        <div id="menuDesplegable" style="width: 180px; background-color: #1a1a1a; border-radius: 8px; overflow: hidden; max-height: 0; transition: max-height 0.3s; position: absolute; top: 110px; left: 0;">
            <a href="#" style="padding: 12px; text-decoration: none; color: white; display: block; border-bottom: 1px solid #333;">Inicio</a>
            <a href="#" style="padding: 12px; text-decoration: none; color: #0088cc; display: block; font-weight: bold;">Palenque Visión</a>
        </div>
    </div>

    <header id="cabecera">
        <img src="/static/imagen/logo.png" alt="Logo" class="logo-palenque">
        <h1>PALENQUE <span>VISIÓN</span></h1>
        <p class="site-description">Agencia audiovisual independiente en Cuba</p>
    </header>

    <div class="raya-azul"></div>

    <main class="contenedor-grid">
        <article class="cartel">
            <div class="pieza-invisible"></div>
            <img src="https://via.placeholder.com/400x250" alt="Noticia">
            <div class="info-cartel">
                <h2>Impacto de la crisis energética en el centro de la isla</h2>
            </div>
        </article>
        </main>

    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 25px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px);">
        <a href="#"><img src="/static/imagen/youtube.png" style="width: 35px; height: auto;"></a>
        <a href="#"><img src="/static/imagen/x.png" style="width: 30px; height: auto;"></a>
        <a href="#"><img src="/static/imagen/instagram.jpg" style="width: 32px; height: auto;"></a>
    </div>

    <script>
        function toggleMenuPalenque(e) {
            var menu = document.getElementById("menuDesplegable");
            menu.style.maxHeight = (menu.style.maxHeight === "0px" || menu.style.maxHeight === "") ? "250px" : "0px";
        }
    </script>
</body>
</html>
